substitutions:
  name: "deye-sun-12k-via-esp32-c6"
  device_description: "Deye SUN-12K via ESP32-C6"
  modbus_controller_id: sg04lp3
  device_type: sun12k

esphome:
  name: ${name}
  friendly_name: Deye Inverter

esp32:
  board: dfrobot_firebeetle2_esp32c6
  framework:
    type: esp-idf

# Enable logging, API, and OTA
logger:
  level: VERBOSE
  
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

status_led:
  pin:
    number: GPIO15 # The onboard LED for FireBeetle C6
    inverted: false

uart:
  id: mod_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 9600
  stop_bits: 1
  # parity: EVEN #
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x01] # Optional: helps separate messages by the Inverter ID

modbus:
  id: modbus1
  uart_id: mod_bus
  flow_control_pin: GPIO4 # Your RE/DE Bridge
  send_wait_time: 100ms # Give the inverter a moment to breathe

modbus_controller:
  - id: ${modbus_controller_id}
    address: 0x1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 30s
    

# --- SENSORS & CONTROLS ---

sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-PV1 Power"
    id: ${device_type}_PV1_Power
    register_type: holding
    address: 672
    unit_of_measurement: "W"
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    skip_updates: 2
    name: "${device_type}-battery capacity"
    id: ${device_type}_battery_capacity
    register_type: holding
    address: 588
    unit_of_measurement: "%"
    state_class: "measurement"
    accuracy_decimals: 1
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-Battery output power"
    id: ${device_type}_Battery_output_power
    register_type: holding
    address: 590
    unit_of_measurement: "W"
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD